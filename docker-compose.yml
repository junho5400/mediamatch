services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    env_file:
      - ./ml-service/.env
    depends_on:
      - qdrant
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models/saved
      - ml_data:/app/data/processed
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333

  mlflow:
    build: ./ml-service
    ports:
      - "5000:5000"
    volumes:
      - ./ml-service:/app
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000
    restart: unless-stopped

volumes:
  qdrant_data:
  ml_models:
  ml_data:
